defaults: &defaults
  api:
    port: 3333

  logger:
    name: NY Times Bestsellers Browser API
    level: debug
    levels:
      trace:
      debug: STDOUT
      info:
      warn:
      error: STDERR
      fatal:
  nytimes:
    apikey: [your-api-key-here]
development:
  <<: *defaults

production:
  <<: *defaults

  logger:
    level: debug
    levels:
      trace:
      debug: STDOUT
      info: ./log/info.log
      warn: ./log/warn.log
      error: ./log/error.log
      fatal: ./log/fatal.log
